<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ember POS — Restaurant Management</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600;9..144,700&family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.0/chart.umd.min.js"></script>
<script src="https://unpkg.com/@supabase/supabase-js@2"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<style>
/* ============ DESIGN TOKENS ============ */
:root{
  --paper:#F7F4EE; --paper-elevated:#FFFFFF; --ink:#181A1F; --ink-soft:#666F7D;
  --ember:#D9480F; --ember-soft:#FBE3D3; --ember-strong:#B93E0C;
  --basil:#2F6D4F; --basil-soft:#E1EEE7;
  --saffron:#C98A00; --saffron-soft:#FBF0D3;
  --danger:#B3261E; --danger-soft:#F8DEDC;
  --border:#E5E0D4; --shadow: 0 1px 2px rgba(20,15,5,.04), 0 8px 24px -12px rgba(20,15,5,.18);
  --radius:14px; --radius-sm:8px;
  --font-display:'Fraunces', Georgia, serif; --font-body:'Inter', system-ui, sans-serif; --font-mono:'JetBrains Mono', monospace;
}
html[data-theme="dark"]{
  --paper:#15171C; --paper-elevated:#1D2027; --ink:#F1EEE6; --ink-soft:#9AA2B1;
  --ember:#FF7A3D; --ember-soft:#3A2416; --ember-strong:#FF9862;
  --basil:#57B389; --basil-soft:#17301F;
  --saffron:#F2B705; --saffron-soft:#332A0B;
  --danger:#FF6B60; --danger-soft:#3A1917;
  --border:#2A2D36; --shadow: 0 1px 2px rgba(0,0,0,.3), 0 8px 24px -12px rgba(0,0,0,.5);
}
*{box-sizing:border-box;}
body{margin:0;background:var(--paper);color:var(--ink);font-family:var(--font-body);transition:background .2s,color .2s;}
::selection{background:var(--ember-soft);}
button{font-family:inherit;}
h1,h2,h3{font-family:var(--font-display);margin:0;letter-spacing:-.01em;}
::-webkit-scrollbar{width:8px;height:8px;}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:8px;}

/* ============ LOGIN ============ */
#login-screen{min-height:100vh;display:flex;align-items:center;justify-content:center;background:
  radial-gradient(circle at 20% 20%, var(--ember-soft), transparent 45%),
  radial-gradient(circle at 80% 80%, var(--basil-soft), transparent 45%), var(--paper);}
.login-card{width:420px;max-width:92vw;background:var(--paper-elevated);border:1px solid var(--border);border-radius:20px;padding:40px 36px;box-shadow:var(--shadow);}
.login-brand{display:flex;align-items:center;gap:10px;margin-bottom:6px;}
.flame{width:26px;height:26px;color:var(--ember);}
.login-brand span{font-family:var(--font-display);font-size:22px;font-weight:600;}
.login-card p.tag{color:var(--ink-soft);font-size:13.5px;margin:0 0 28px;}
.login-card input{width:100%;padding:12px 14px;border-radius:var(--radius-sm);border:1.5px solid var(--border);background:var(--paper);color:var(--ink);font-size:14px;margin-bottom:16px;}
.login-card input:focus{outline:none;border-color:var(--ember);}
.btn-primary{width:100%;padding:13px;border-radius:var(--radius-sm);border:none;background:var(--ember);color:#fff;font-weight:700;font-size:14px;cursor:pointer;transition:.15s;}
.btn-primary:hover{background:var(--ember-strong);}
.btn-primary:disabled{opacity:.5;cursor:not-allowed;}
.firebase-status{font-size:12px;padding:10px;border-radius:8px;margin-bottom:16px;text-align:center;}
.firebase-status.ready{background:var(--basil-soft);color:var(--basil);}
.firebase-status.error{background:var(--danger-soft);color:var(--danger);}

/* ============ APP SHELL ============ */
#app{display:none;min-height:100vh;}
.shell{display:grid;grid-template-columns:236px 1fr;min-height:100vh;}
.sidebar{background:var(--paper-elevated);border-right:1px solid var(--border);display:flex;flex-direction:column;padding:20px 14px;position:sticky;top:0;height:100vh;}
.brand{display:flex;align-items:center;gap:9px;padding:6px 10px 22px;}
.brand span{font-family:var(--font-display);font-weight:600;font-size:18px;}
.nav-item{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:10px;cursor:pointer;font-size:13.5px;font-weight:600;color:var(--ink-soft);margin-bottom:2px;transition:.12s;}
.nav-item svg{width:17px;height:17px;flex-shrink:0;}
.nav-item:hover{background:var(--paper);color:var(--ink);}
.nav-item.active{background:var(--ember-soft);color:var(--ember);}
.sidebar-foot{margin-top:auto;border-top:1px solid var(--border);padding-top:14px;}
.user-chip{display:flex;align-items:center;gap:10px;padding:8px;border-radius:10px;}
.avatar{width:34px;height:34px;border-radius:50%;background:var(--ember);color:#fff;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:13px;flex-shrink:0;}
.user-chip .un{font-size:13px;font-weight:700;}
.user-chip .ur{font-size:11px;color:var(--ink-soft);}

.main{padding:22px 30px 50px;min-width:0;}
.topbar{display:flex;align-items:center;justify-content:space-between;margin-bottom:26px;gap:16px;}
.topbar h1{font-size:23px;font-weight:600;}
.topbar .sub{color:var(--ink-soft);font-size:13px;margin-top:2px;}

.grid{display:grid;gap:16px;}
.cols-3{grid-template-columns:repeat(3,1fr);}
.cols-2{grid-template-columns:2fr 1fr;}
@media(max-width:1100px){.cols-3{grid-template-columns:repeat(2,1fr);}.cols-2{grid-template-columns:1fr;}}

.card{background:var(--paper-elevated);border:1px solid var(--border);border-radius:var(--radius);padding:18px 20px;box-shadow:var(--shadow);}
.card-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;}
.card-head h3{font-size:15px;font-weight:700;font-family:var(--font-body);}

table{width:100%;border-collapse:collapse;font-size:13px;}
th{text-align:left;color:var(--ink-soft);font-weight:700;font-size:11px;text-transform:uppercase;letter-spacing:.04em;padding:8px 10px;border-bottom:1px solid var(--border);}
td{padding:10px 10px;border-bottom:1px solid var(--border);}
tr:last-child td{border-bottom:none;}
.badge{padding:3px 9px;border-radius:99px;font-size:11px;font-weight:700;display:inline-block;}
.badge-ok{background:var(--basil-soft);color:var(--basil);}
.badge-danger{background:var(--danger-soft);color:var(--danger);}

.btn{padding:8px 14px;border-radius:8px;border:1px solid var(--border);background:var(--paper-elevated);color:var(--ink);font-size:12.5px;font-weight:700;cursor:pointer;}
.btn:hover{border-color:var(--ember);color:var(--ember);}
.btn-ember{background:var(--ember);color:#fff;border-color:var(--ember);}
.btn-ember:hover{background:var(--ember-strong);}
.btn-danger{background:var(--danger);color:#fff;border-color:var(--danger);}
.btn-danger:hover{background:var(--danger-soft);color:var(--danger);}

/* ============ MODAL ============ */
.overlay{position:fixed;inset:0;background:rgba(10,8,4,.5);display:none;align-items:center;justify-content:center;z-index:50;backdrop-filter:blur(2px);}
.overlay.show{display:flex;}
.modal{background:var(--paper-elevated);border-radius:16px;padding:26px;width:500px;max-width:92vw;box-shadow:var(--shadow);max-height:86vh;overflow:auto;}
.modal h3{font-size:17px;margin-bottom:14px;}

.form-group{margin-bottom:14px;}
.form-group label{display:block;font-size:12px;font-weight:700;color:var(--ink-soft);margin-bottom:5px;}
.form-group input,.form-group select{width:100%;padding:10px 12px;border-radius:8px;border:1.5px solid var(--border);background:var(--paper);color:var(--ink);font-size:13.5px;font-family:inherit;}
.form-group input:focus,.form-group select:focus{outline:none;border-color:var(--ember);}
.form-row{display:flex;gap:10px;}
.form-row .form-group{flex:1;}

.view{display:none;}
.view.active{display:block;animation:fadein .25s ease;}
@keyframes fadein{from{opacity:0;transform:translateY(4px);}to{opacity:1;transform:translateY(0);}}

/* ============ TOASTS ============ */
#toast-stack{position:fixed;bottom:20px;right:20px;z-index:100;display:flex;flex-direction:column;gap:8px;}
.toast{background:var(--ink);color:var(--paper);padding:11px 16px;border-radius:10px;font-size:13px;font-weight:600;box-shadow:var(--shadow);max-width:320px;animation:fadein .2s ease;}
.toast.error{background:var(--danger);color:#fff;}
.toast.success{background:var(--basil);color:#fff;}

.clockout-btn{width:100%;margin-top:8px;padding:9px;border-radius:var(--radius-sm);border:1px solid var(--border);background:transparent;color:var(--ink-soft);font-size:12px;font-weight:600;cursor:pointer;}
.clockout-btn:hover{border-color:var(--danger);color:var(--danger);}
</style>
</head>
<body>

<!-- ============ LOGIN SCREEN ============ -->
<div id="login-screen">
  <div class="login-card">
    <div class="login-brand">
      <svg class="flame" viewBox="0 0 24 24" fill="none"><path d="M12 2c1 3-2 4-2 7a4 4 0 108 0c0-1-1-2-1-2 1 4-1 5-2 5-2 0-2-2-1-4 .5-1 .5-2 0-3-1 2-3 2-4-1-1 2 0 3-1 4-2 2-4 0-4-2 0-2 1-3 2-4z" fill="currentColor"/></svg>
      <span>Ember POS</span>
    </div>
    <p class="tag">Sign in to your restaurant workspace</p>
    
    <div id="firebase-status-badge" class="firebase-status error">
      🔄 Checking Firebase connection...
    </div>

    <div id="login-fields-standard">
      <input type="email" id="login-email" placeholder="Email address" autocomplete="username">
      <input type="password" id="login-password" placeholder="Password" autocomplete="current-password">
    </div>

    <p class="field-error" id="login-error"></p>
    <button class="btn-primary" id="login-btn" onclick="doLogin()" disabled>Sign in →</button>
    <p style="font-size:11.5px;color:var(--ink-soft);text-align:center;margin-top:16px;">✓ Using your Firebase credentials</p>
  </div>
</div>

<!-- ============ APP SHELL ============ -->
<div id="app">
  <div class="shell" id="shell">
    <aside class="sidebar" id="sidebar">
      <div class="brand">
        <svg class="flame" style="width:20px;height:20px;" viewBox="0 0 24 24" fill="none"><path d="M12 2c1 3-2 4-2 7a4 4 0 108 0c0-1-1-2-1-2 1 4-1 5-2 5-2 0-2-2-1-4 .5-1 .5-2 0-3-1 2-3 2-4-1-1 2 0 3-1 4-2 2-4 0-4-2 0-2 1-3 2-4z" fill="currentColor"/></svg>
        <span>Ember</span>
      </div>
      <nav id="nav-container"></nav>
      <div class="sidebar-foot">
        <div class="user-chip">
          <div class="avatar" id="avatar-init">A</div>
          <div>
            <div class="un" id="user-name">User</div>
            <div class="ur" id="user-role">Role</div>
          </div>
        </div>
        <button class="clockout-btn" onclick="logout()">Sign out</button>
      </div>
    </aside>
    <main class="main">
      <div class="topbar">
        <div>
          <h1 id="page-title">Welcome</h1>
          <div class="sub" id="page-sub"></div>
        </div>
      </div>

      <div id="views"></div>
    </main>
  </div>
</div>

<div class="overlay" id="modal-overlay">
  <div class="modal" id="modal-body"></div>
</div>
<div id="toast-stack"></div>

<script>
/* =====================================================================
   ICONS
===================================================================== */
const ICONS = {
  home:'<path d="M3 11l9-8 9 8"/><path d="M5 10v10h14V10"/><path d="M9 20v-6h6v6"/>',
  users:'<circle cx="9" cy="8" r="3.2"/><path d="M2.5 20c0-3.5 3-6 6.5-6s6.5 2.5 6.5 6"/><circle cx="17" cy="9" r="2.6"/><path d="M21.5 20c0-2.8-2-5-4.5-5.6"/>',
  plus:'<path d="M12 5v14M5 12h14"/>',
  trash:'<path d="M3 6h18M8 6V4a2 2 0 012-2h4a2 2 0 012 2v2m0 0v12a2 2 0 01-2 2H10a2 2 0 01-2-2V6"/><line x1="10" y1="11" x2="10" y2="17"/><line x1="14" y1="11" x2="14" y2="17"/>',
  edit:'<path d="M17 3a2.828 2.828 0 114 4L7.5 20.5 2 22l1.5-5.5L17 3z"/>',
  check:'<path d="M20 6L9 17l-5-5"/>',
  alert:'<path d="M12 9v4M12 17h.01"/><path d="M10.3 3.9L1.8 18a2 2 0 001.7 3h17a2 2 0 001.7-3L13.7 3.9a2 2 0 00-3.4 0z"/>',
};
function icon(name,cls=''){return `<svg class="${cls}" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">${ICONS[name]||''}</svg>`;}

/* =====================================================================
   FIREBASE & SUPABASE CONFIG
===================================================================== */
const CONFIG = {
  firebase: {
    apiKey: 'AIzaSyDBi2tkdDX2DmNNPoQ3xe0l_ix48u13Ar8',
    authDomain: 'restaraunt-938ec.firebaseapp.com',
    projectId: 'restaraunt-938ec',
    storageBucket: 'restaraunt-938ec.firebasestorage.app',
    messagingSenderId: '152970762068',
    appId: '1:152970762068:web:50667f7aca3d05edc71ac1',
  },
  supabase: {
    url: 'https://xktgaefduxaqnrlseltq.supabase.co',
    anonKey: 'sb_publishable_Q3PCcYpkd3GeTinspNRYUA_4aLmOnf8',
  },
};

const BACKEND = { firebaseReady:false, supabaseReady:false, supabaseClient:null };

try{
  if(CONFIG.firebase.apiKey && window.firebase){
    firebase.initializeApp(CONFIG.firebase);
    BACKEND.firebaseReady = true;
  }
}catch(e){ console.error('Firebase init error:', e.message); }

try{
  if(CONFIG.supabase.url && CONFIG.supabase.anonKey && window.supabase){
    BACKEND.supabaseClient = window.supabase.createClient(CONFIG.supabase.url, CONFIG.supabase.anonKey);
    BACKEND.supabaseReady = true;
  }
}catch(e){ console.error('Supabase init error:', e.message); }

/* =====================================================================
   STORAGE & SYNC
===================================================================== */
const Storage = {
  async get(key, fallback=null){
    try{
      const v = localStorage.getItem(key);
      return v ? JSON.parse(v) : fallback;
    }catch(e){ return fallback; }
  },
  async set(key, value){
    try{ localStorage.setItem(key, JSON.stringify(value)); return true; }
    catch(e){ return false; }
  }
};

/* =====================================================================
   AUTH
===================================================================== */
const Auth = {
  async signIn(email, password){
    if(!BACKEND.firebaseReady){
      throw new Error('Firebase not connected.');
    }
    try{
      const cred = await firebase.auth().signInWithEmailAndPassword(email, password);
      const staffRecord = STAFF.find(s=>s.email && s.email.toLowerCase()===String(email).toLowerCase());
      if(!staffRecord) throw new Error('No staff record found. Contact admin.');
      return { uid: cred.user.uid, email: cred.user.email, role: staffRecord.role.toLowerCase(), name: staffRecord.name };
    }catch(e){
      const map = {
        'auth/wrong-password':'Incorrect password.',
        'auth/invalid-credential':'Incorrect email or password.',
        'auth/user-not-found':'No account found.',
        'auth/too-many-requests':'Too many attempts. Try later.',
      };
      throw new Error(map[e.code] || e.message);
    }
  },
  async signOut(){
    if(BACKEND.firebaseReady){ 
      try{ await firebase.auth().signOut(); }catch(e){} 
    }
  }
};

/* =====================================================================
   INITIAL STAFF (from Firebase/HTML - developer adds these)
===================================================================== */
let STAFF = [
  {id:0,name:'Kelvin Njuguna',role:'Admin',email:'ember@restaraunt.com',status:'On shift',locationId:'all'},
  {id:1,name:'Waiter 1',role:'Waiter',email:'waiter@restaraunt.com',status:'On shift',locationId:'loc1'},
  {id:2,name:'Kitchen Chef',role:'Kitchen',email:'kitchen@restaraunt.com',status:'On shift',locationId:'loc1'},
  {id:3,name:'Cashier',role:'Cashier',email:'cashier@restaraunt.com',status:'On shift',locationId:'loc1'},
];

const LOCATIONS = [
  {id:'loc1', name:'Main (Westlands)'},
  {id:'loc2', name:'Karen Branch'},
  {id:'loc3', name:'CBD Express'},
];

const ROLES = [
  {id:'admin', title:'Admin'},
  {id:'waiter', title:'Waiter'},
  {id:'kitchen', title:'Kitchen'},
  {id:'cashier', title:'Cashier'},
  {id:'supervisor', title:'Supervisor'},
];

const NAV = {
  admin: [
    {id:'dashboard', label:'Dashboard', icon:'home'},
    {id:'staff', label:'Staff management', icon:'users'},
  ],
  waiter: [
    {id:'dashboard', label:'Dashboard', icon:'home'},
  ],
  kitchen: [
    {id:'dashboard', label:'Dashboard', icon:'home'},
  ],
  cashier: [
    {id:'dashboard', label:'Dashboard', icon:'home'},
  ],
};

let STATE = {
  role: null,
  userName: 'User',
  userEmail: null,
  view: null,
  sessionId: 'sess-'+Math.random().toString(36).slice(2),
};

/* =====================================================================
   SUPABASE SYNC
===================================================================== */
const Sync = {
  async loadStaffFromSupabase(){
    if(!BACKEND.supabaseReady) return false;
    try{
      const {data, error} = await BACKEND.supabaseClient.from('staff').select('*');
      if(!error && data && data.length){
        STAFF = data.map(s=>({
          id:s.id, name:s.name, role:s.role, email:s.email,
          status:s.status, locationId:s.locationId
        }));
        return true;
      }
      return false;
    }catch(e){ console.warn('Supabase load failed:', e.message); return false; }
  },

  async saveStaffToSupabase(){
    if(!BACKEND.supabaseReady) return false;
    try{
      await BACKEND.supabaseClient.from('staff').delete().not('id','is',null);
      if(STAFF.length){
        await BACKEND.supabaseClient.from('staff').insert(STAFF);
      }
      return true;
    }catch(e){ console.warn('Supabase save failed:', e.message); return false; }
  },

  async addStaff(staffMember){
    STAFF.push(staffMember);
    await Storage.set('staff', STAFF);
    const saved = await this.saveStaffToSupabase();
    return saved;
  },

  async updateStaff(id, updates){
    const idx = STAFF.findIndex(s=>s.id===id);
    if(idx===-1) return false;
    STAFF[idx] = {...STAFF[idx], ...updates};
    await Storage.set('staff', STAFF);
    const saved = await this.saveStaffToSupabase();
    return saved;
  },

  async deleteStaff(id){
    const idx = STAFF.findIndex(s=>s.id===id);
    if(idx===-1) return false;
    STAFF.splice(idx, 1);
    await Storage.set('staff', STAFF);
    const saved = await this.saveStaffToSupabase();
    return saved;
  }
};

/* =====================================================================
   UI HELPERS
===================================================================== */
function showToast(msg, kind=''){
  const t = document.createElement('div');
  t.className = 'toast ' + kind;
  t.textContent = msg;
  document.getElementById('toast-stack').appendChild(t);
  setTimeout(()=>t.remove(), 3000);
}

function closeModal(){
  document.getElementById('modal-overlay').classList.remove('show');
}

function openModal(html){
  document.getElementById('modal-body').innerHTML = html;
  document.getElementById('modal-overlay').classList.add('show');
}

/* =====================================================================
   LOGIN
===================================================================== */
async function doLogin(){
  const email = document.getElementById('login-email').value.trim();
  const password = document.getElementById('login-password').value.trim();
  const errEl = document.getElementById('login-error');
  const btn = document.getElementById('login-btn');
  
  errEl.textContent = '';

  if(!email || !password){
    errEl.textContent = 'Enter email and password.';
    return;
  }

  btn.disabled = true;
  btn.textContent = 'Signing in...';

  try{
    const user = await Auth.signIn(email, password);
    STATE.role = user.role;
    STATE.userName = user.name;
    STATE.userEmail = user.email;
    
    document.getElementById('login-screen').style.display='none';
    document.getElementById('app').style.display='block';
    document.getElementById('user-name').textContent = STATE.userName;
    document.getElementById('user-role').textContent = ROLES.find(r=>r.id===STATE.role).title;
    document.getElementById('avatar-init').textContent = STATE.userName.trim()[0].toUpperCase();
    
    buildNav();
    goView('dashboard');
  }catch(e){
    errEl.textContent = e.message || 'Sign-in failed.';
    btn.disabled = false;
    btn.textContent = 'Sign in →';
  }
}

function logout(){
  Auth.signOut();
  STATE = {...STATE, role:null, view:null};
  document.getElementById('app').style.display='none';
  document.getElementById('login-screen').style.display='flex';
  document.getElementById('login-error').textContent = '';
  document.getElementById('login-email').value = '';
  document.getElementById('login-password').value = '';
  document.getElementById('login-btn').disabled = false;
  document.getElementById('login-btn').textContent = 'Sign in →';
}

/* =====================================================================
   NAV
===================================================================== */
function buildNav(){
  const items = NAV[STATE.role] || [];
  document.getElementById('nav-container').innerHTML = items.map(i=>`
    <div class="nav-item" data-view="${i.id}" onclick="goView('${i.id}')">
      ${icon(i.icon)} <span>${i.label}</span>
    </div>`).join('');
}

function goView(id){
  STATE.view = id;
  document.querySelectorAll('.nav-item').forEach(n=>n.classList.toggle('active', n.dataset.view===id));
  document.getElementById('page-title').textContent = id==='dashboard'?'Dashboard':'Staff Management';
  document.getElementById('page-sub').textContent = new Date().toLocaleDateString('en-US',{weekday:'short',month:'short',day:'numeric'});
  const el = document.getElementById('views');
  el.innerHTML = RENDER[id] ? RENDER[id]() : '<div style="padding:50px;color:var(--ink-soft);text-align:center;">Coming soon</div>';
}

/* =====================================================================
   VIEWS
===================================================================== */
const RENDER = {};

RENDER.dashboard = function(){
  return `<div class="grid cols-3">
    <div class="card">
      <div style="font-size:12px;color:var(--ink-soft);font-weight:600;">Total Staff</div>
      <div style="font-family:var(--font-display);font-size:28px;font-weight:600;margin-top:6px;">${STAFF.length}</div>
    </div>
    <div class="card">
      <div style="font-size:12px;color:var(--ink-soft);font-weight:600;">Active Users</div>
      <div style="font-family:var(--font-display);font-size:28px;font-weight:600;margin-top:6px;">${STAFF.filter(s=>s.status==='On shift').length}</div>
    </div>
    <div class="card">
      <div style="font-size:12px;color:var(--ink-soft);font-weight:600;">Supabase Sync</div>
      <div style="margin-top:6px;"><span class="badge badge-${BACKEND.supabaseReady?'ok':'danger'}">${BACKEND.supabaseReady?'Connected':'Offline'}</span></div>
    </div>
  </div>`;
};

RENDER.staff = function(){
  return `
    <div style="margin-bottom:20px;">
      <button class="btn btn-ember" onclick="openAddStaffModal()">${icon('plus')} Add Staff Member</button>
    </div>
    <div class="card">
      <table>
        <thead><tr><th>Name</th><th>Email</th><th>Role</th><th>Location</th><th>Status</th><th>Actions</th></tr></thead>
        <tbody>
          ${STAFF.map(s=>`
            <tr>
              <td>${s.name}</td>
              <td style="font-size:12px;">${s.email}</td>
              <td><span class="badge badge-ok">${s.role}</span></td>
              <td>${LOCATIONS.find(l=>l.id===s.locationId)?.name || s.locationId}</td>

              <td style="display:flex;gap:6px;">
                <button class="btn" style="padding:4px 8px;font-size:11px;" onclick="openEditStaffModal(${s.id})">${icon('edit')}</button>

/* =====================================================================
   STAFF MANAGEMENT MODALS
===================================================================== */
function openAddStaffModal(){
  const html = `
    <h3>Add New Staff Member</h3>
    <p style="font-size:12px;color:var(--ink-soft);margin-bottom:16px;">⚠️ Must create Firebase user first: firebase.google.com</p>
    
    <div class="form-group">
      <label>Name</label>
      <input type="text" id="form-name" placeholder="John Doe">
    </div>
    
    <div class="form-group">
      <label>Email (must match Firebase)</label>
      <input type="email" id="form-email" placeholder="john@restaraunt.com">
    </div>
    
    <div class="form-row">
      <div class="form-group">
        <label>Role</label>
        <select id="form-role">
          ${ROLES.map(r=>`<option value="${r.id}">${r.title}</option>`).join('')}
        </select>
      </div>
      <div class="form-group">
        <label>Location</label>
        <select id="form-location">
          ${LOCATIONS.map(l=>`<option value="${l.id}">${l.name}</option>`).join('')}
        </select>
      </div>
    </div>
    
    <div class="form-group">
      <label>Status</label>
      <select id="form-status">
        <option value="On shift">On shift</option>
        <option value="Off shift">Off shift</option>
      </select>
    </div>
    
    <div style="display:flex;gap:10px;margin-top:20px;">
      <button class="btn btn-ember" onclick="saveNewStaff()" style="flex:1;">Save Staff</button>
      <button class="btn" onclick="closeModal()" style="flex:1;">Cancel</button>
    </div>
  `;
  openModal(html);
}

async function saveNewStaff(){
  const name = document.getElementById('form-name').value.trim();
  const email = document.getElementById('form-email').value.trim();
  const role = document.getElementById('form-role').value;
  const location = document.getElementById('form-location').value;
  const status = document.getElementById('form-status').value;
  
  if(!name || !email){
    showToast('Fill in all fields', 'error');
    return;
  }
  
  if(STAFF.find(s=>s.email.toLowerCase()===email.toLowerCase())){
    showToast('Email already exists', 'error');
    return;
  }
  
  const newId = Math.max(...STAFF.map(s=>s.id), -1) + 1;
  const staffMember = {id:newId, name, email, role, status, locationId:location};
  
  const saved = await Sync.addStaff(staffMember);
  if(saved){
    showToast('Staff member added & synced to Supabase', 'success');
  } else {
    showToast('Staff member added (local only)', 'success');
  }
  
  closeModal();
  goView('staff');
}

function openEditStaffModal(id){
  const staff = STAFF.find(s=>s.id===id);
  if(!staff) return;
  
  const html = `
    <h3>Edit Staff Member</h3>
    
    <div class="form-group">
      <label>Name</label>
      <input type="text" id="form-name" value="${staff.name}">
    </div>
    
    <div class="form-group">
      <label>Email</label>
      <input type="email" id="form-email" value="${staff.email}" disabled style="opacity:0.6;cursor:not-allowed;">
      <small style="font-size:11px;color:var(--ink-soft);">Email cannot be changed</small>
    </div>
    
    <div class="form-row">
      <div class="form-group">
        <label>Role</label>
        <select id="form-role">
          ${ROLES.map(r=>`<option value="${r.id}" ${r.id===staff.role?'selected':''}>${r.title}</option>`).join('')}
        </select>
      </div>
      <div class="form-group">
        <label>Location</label>
        <select id="form-location">
          ${LOCATIONS.map(l=>`<option value="${l.id}" ${l.id===staff.locationId?'selected':''}>${l.name}</option>`).join('')}
        </select>
      </div>
    </div>
    
    <div class="form-group">
      <label>Status</label>
      <select id="form-status">
        <option value="On shift" ${staff.status==='On shift'?'selected':''}>On shift</option>
        <option value="Off shift" ${staff.status==='Off shift'?'selected':''}>Off shift</option>
      </select>
    </div>
    
    <div style="display:flex;gap:10px;margin-top:20px;">
      <button class="btn btn-ember" onclick="saveEditStaff(${id})" style="flex:1;">Update</button>
      <button class="btn" onclick="closeModal()" style="flex:1;">Cancel</button>
    </div>
  `;
  openModal(html);
}

async function saveEditStaff(id){
  const name = document.getElementById('form-name').value.trim();
  const role = document.getElementById('form-role').value;
  const location = document.getElementById('form-location').value;
  const status = document.getElementById('form-status').value;
  
  if(!name){
    showToast('Name cannot be empty', 'error');
    return;
  }
  
  const saved = await Sync.updateStaff(id, {name, role, locationId:location, status});
  if(saved){
    showToast('Staff member updated & synced', 'success');
  } else {
    showToast('Staff member updated (local only)', 'success');
  }
  
  closeModal();
  goView('staff');
}

async function deleteStaff(id){
  const staff = STAFF.find(s=>s.id===id);
  if(!confirm(`Delete ${staff.name}? They can still login to Firebase but won't appear in staff list.`)){
    return;
  }
  
  const saved = await Sync.deleteStaff(id);
  if(saved){
    showToast('Staff member deleted & synced', 'success');
  } else {
    showToast('Staff member deleted (local only)', 'success');
  }
  goView('staff');
}

/* =====================================================================
   FIREBASE STATUS CHECK
===================================================================== */
async function checkFirebaseStatus(){
  const badge = document.getElementById('firebase-status-badge');
  const btn = document.getElementById('login-btn');
  
  if(!BACKEND.firebaseReady){
    badge.className = 'firebase-status error';
    badge.textContent = '❌ Firebase not connected';
    btn.disabled = true;
    return false;
  }

  try{
    await new Promise((resolve, reject)=>{
      const unsubscribe = firebase.auth().onAuthStateChanged(
        user=>{ unsubscribe(); resolve(user); },
        err=>{ unsubscribe(); reject(err); }
      );
    });
    
    badge.className = 'firebase-status ready';
    badge.textContent = '✅ Firebase connected — ready to sign in';
    btn.disabled = false;
    return true;
  }catch(e){
    badge.className = 'firebase-status error';
    badge.textContent = '⚠️ Firebase error: ' + e.message;
    btn.disabled = true;
    return false;
  }
}

/* =====================================================================
   BOOT
===================================================================== */
(async function boot(){
  // Load staff from localStorage
  const savedStaff = await Storage.get('staff', null);
  if(savedStaff) STAFF = savedStaff;
  
  // Try to load from Supabase
  await Sync.loadStaffFromSupabase();
  
  // Check Firebase
  await checkFirebaseStatus();
  setInterval(checkFirebaseStatus, 5000);
})();

document.getElementById('modal-overlay').addEventListener('click', e=>{ 
  if(e.target.id==='modal-overlay') closeModal(); 
});
</script>
